<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>像素小猫喝可乐</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f5f0e8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: sans-serif;
    }

    h2 {
      color: #5a3e2b;
      margin-bottom: 28px;
      font-size: 1.2rem;
      letter-spacing: 0.12em;
    }

    /* ── 主舞台 ── */
    .scene {
      width: 420px;
      height: 480px;
      background: linear-gradient(180deg, #d4eaf7 55%, #b8d4a8 55%);
      border-radius: 16px;
      border: 3px solid #c9a87c;
      box-shadow: 0 6px 24px rgba(0,0,0,0.13);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    /* 云朵装饰 */
    .cloud {
      position: absolute;
      top: 18px;
      width: 70px;
      height: 28px;
      background: white;
      border-radius: 50px;
      opacity: 0.7;
    }
    .cloud::before, .cloud::after {
      content: '';
      position: absolute;
      background: white;
      border-radius: 50%;
    }
    .cloud::before { width: 36px; height: 36px; top: -16px; left: 10px; }
    .cloud::after  { width: 24px; height: 24px; top: -10px; left: 36px; }
    .cloud-1 { left: 30px;  animation: drift 6s ease-in-out infinite; }
    .cloud-2 { left: 290px; animation: drift 8s ease-in-out infinite reverse; width: 55px; }

    @keyframes drift {
      0%, 100% { transform: translateX(0); }
      50%       { transform: translateX(12px); }
    }

    /* 小猫图片 */
    .cat-img {
      width: 300px;
      height: auto;
      image-rendering: pixelated;
      margin-bottom: 20px;
      position: relative;
      z-index: 2;
    }

    /* 喝可乐动画：轻微前后摇摆 */
    .cat-img.drinking {
      animation: sip 0.55s ease-in-out infinite alternate;
      transform-origin: bottom center;
    }
    @keyframes sip {
      0%   { transform: rotate(-2deg) translateY(0px); }
      100% { transform: rotate(2deg)  translateY(-4px); }
    }

    /* 喝完后小猫难过 */
    .cat-img.sad {
      animation: sob 1.2s ease-in-out infinite alternate;
      transform-origin: bottom center;
    }
    @keyframes sob {
      0%   { transform: translateY(0px); }
      100% { transform: translateY(-6px); }
    }

    /* ── 可乐液位条 ── */
    .cola-bar-wrap {
      margin-top: 28px;
      width: 420px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .cola-label {
      color: #7a5c40;
      font-size: 0.85rem;
      white-space: nowrap;
    }
    .cola-bar-bg {
      flex: 1;
      height: 20px;
      background: #e8d5c0;
      border-radius: 10px;
      border: 2px solid #c9a87c;
      overflow: hidden;
    }
    .cola-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #8b0000, #cc2200, #ff4422);
      border-radius: 10px;
      transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }
    /* 气泡效果在液位条里 */
    .cola-bar-fill::after {
      content: '';
      position: absolute;
      right: 4px; top: 4px;
      width: 8px; height: 8px;
      background: rgba(255,255,255,0.45);
      border-radius: 50%;
      animation: bubble-bar 0.9s ease-in-out infinite;
    }
    @keyframes bubble-bar {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50%       { opacity: 0.9; transform: scale(1.3); }
    }

    /* ── 气泡弹出文字 ── */
    .popup {
      position: absolute;
      top: 60px;
      right: 50px;
      font-size: 1.3rem;
      font-weight: bold;
      color: #cc2200;
      text-shadow: 1px 1px 0 #fff, -1px -1px 0 #fff;
      opacity: 0;
      pointer-events: none;
      z-index: 10;
      letter-spacing: 0.05em;
    }
    .popup.show {
      animation: pop 0.7s ease forwards;
    }
    @keyframes pop {
      0%   { opacity: 0; transform: scale(0.5) translateY(10px); }
      40%  { opacity: 1; transform: scale(1.2) translateY(-5px); }
      70%  { opacity: 1; transform: scale(1.0) translateY(0); }
      100% { opacity: 0; transform: scale(0.9) translateY(-12px); }
    }

    /* ── 上浮气泡 ── */
    .bubble {
      position: absolute;
      border-radius: 50%;
      background: rgba(180, 40, 20, 0.25);
      border: 1.5px solid rgba(180, 40, 20, 0.4);
      pointer-events: none;
      animation: rise linear forwards;
      z-index: 5;
    }
    @keyframes rise {
      0%   { opacity: 0.9; transform: translateY(0) scale(1); }
      100% { opacity: 0;   transform: translateY(-120px) scale(0.5); }
    }

    /* ── 关键帧展示区 ── */
    .frames-row {
      margin-top: 32px;
      display: flex;
      gap: 10px;
    }
    .frames-row .frame-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      cursor: pointer;
    }
    .frames-row img {
      width: 80px;
      height: 90px;
      object-fit: cover;
      image-rendering: pixelated;
      border: 2px solid #ddd;
      border-radius: 8px;
      background: white;
      transition: transform 0.2s, border-color 0.2s;
    }
    .frames-row img:hover          { transform: translateY(-5px); border-color: #c9a87c; }
    .frames-row img.active-frame   { border-color: #cc2200; border-width: 3px; transform: translateY(-5px); }
    .frames-row .frame-item span {
      font-size: 0.72rem;
      color: #7a5c40;
    }

    /* ── 状态文字 ── */
    #status-text {
      margin-top: 18px;
      font-size: 0.95rem;
      color: #5a3e2b;
      min-height: 1.4em;
      letter-spacing: 0.05em;
      transition: opacity 0.4s;
    }
  </style>
</head>
<body>

  <h2>像素小猫 · 喝光可乐</h2>

  <!-- 主舞台 -->
  <div class="scene" id="scene">
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="popup" id="popup">gulp!</div>
    <img class="cat-img drinking" id="catImg"
         src="800cd8ae-2fe0-48fe-97d1-b3e4bdceb497.jpeg" alt="小猫喝可乐">
  </div>

  <!-- 可乐液位条 -->
  <div class="cola-bar-wrap">
    <span class="cola-label">可乐余量</span>
    <div class="cola-bar-bg">
      <div class="cola-bar-fill" id="colaBar" style="width: 100%"></div>
    </div>
    <span class="cola-label" id="colaPercent">100%</span>
  </div>

  <!-- 关键帧缩略图 -->
  <div class="frames-row" id="framesRow"></div>

  <!-- 状态文字 -->
  <p id="status-text">小猫正在大口喝可乐……</p>

<script>
  /* ── 配置 ── */
  const frames = [
    {
      src:    '800cd8ae-2fe0-48fe-97d1-b3e4bdceb497.jpeg',
      level:  100,
      label:  '满满一罐',
      popup:  'slurp~',
      status: '小猫正在大口喝可乐……',
    },
    {
      src:    '生成特定图片 (2).png',
      level:  65,
      label:  '喝了一半',
      popup:  'gulp!',
      status: '好喝！继续喝！',
    },
    {
      src:    'Gemini_Generated_Image_gecvjzgecvjzgecv.png',
      level:  30,
      label:  '快喝完了',
      popup:  'gulp gulp!',
      status: '越来越少了……',
    },
    {
      src:    'Gemini_Generated_Image_58lucy58lucy58lu.png',
      level:  0,
      label:  '喝光了！',
      popup:  '(╥_╥)',
      status: '可乐喝完啦，小猫好难过……',
      sad:    true,
    },
  ];

  const HOLD_MS     = 1800;   // 每帧停留时长
  const LAST_HOLD   = 3500;   // 最后一帧（空罐）停留更久
  const PAUSE_EMPTY = 2200;   // 空罐后暂停再重置

  const catImg      = document.getElementById('catImg');
  const colaBar     = document.getElementById('colaBar');
  const colaPercent = document.getElementById('colaPercent');
  const popupEl     = document.getElementById('popup');
  const statusEl    = document.getElementById('status-text');
  const framesRow   = document.getElementById('framesRow');
  const scene       = document.getElementById('scene');

  /* ── 构建缩略图 ── */
  frames.forEach((f, i) => {
    const item = document.createElement('div');
    item.className = 'frame-item';
    const img = document.createElement('img');
    img.src = f.src;
    img.id  = `thumb-${i}`;
    const lbl = document.createElement('span');
    lbl.textContent = f.label;
    item.appendChild(img);
    item.appendChild(lbl);
    framesRow.appendChild(item);
  });

  /* ── 弹出文字 ── */
  function showPopup(text) {
    popupEl.textContent = text;
    popupEl.classList.remove('show');
    void popupEl.offsetWidth;          // reflow
    popupEl.classList.add('show');
  }

  /* ── 上浮气泡 ── */
  function spawnBubble() {
    const b = document.createElement('div');
    b.className = 'bubble';
    const size = 6 + Math.random() * 14;
    b.style.width  = size + 'px';
    b.style.height = size + 'px';
    b.style.left   = (160 + Math.random() * 100) + 'px';
    b.style.bottom = (80  + Math.random() * 60)  + 'px';
    const dur = 1.2 + Math.random() * 1.2;
    b.style.animationDuration = dur + 's';
    scene.appendChild(b);
    setTimeout(() => b.remove(), dur * 1000);
  }

  /* ── 切换到某帧 ── */
  function goFrame(i) {
    const f = frames[i];

    // 图片
    catImg.src = f.src;

    // 动画状态
    catImg.classList.remove('drinking', 'sad');
    catImg.classList.add(f.sad ? 'sad' : 'drinking');

    // 液位条
    colaBar.style.width = f.level + '%';
    colaPercent.textContent = f.level + '%';

    // 文字 & 弹出
    statusEl.textContent = f.status;
    showPopup(f.popup);

    // 缩略图高亮
    frames.forEach((_, j) => {
      document.getElementById(`thumb-${j}`).classList.toggle('active-frame', j === i);
    });
  }

  /* ── 气泡定时器（仅喝酒阶段） ── */
  let bubbleTimer = null;
  function startBubbles() {
    if (bubbleTimer) return;
    bubbleTimer = setInterval(spawnBubble, 350);
  }
  function stopBubbles() {
    clearInterval(bubbleTimer);
    bubbleTimer = null;
  }

  /* ── 主动画循环 ── */
  let currentFrame = 0;

  function advance() {
    goFrame(currentFrame);

    const f    = frames[currentFrame];
    const hold = (currentFrame === frames.length - 1) ? LAST_HOLD : HOLD_MS;

    if (currentFrame < frames.length - 1) {
      startBubbles();
      currentFrame++;
      setTimeout(advance, hold);
    } else {
      // 喝完了
      stopBubbles();
      setTimeout(() => {
        currentFrame = 0;
        advance();          // 重置循环
      }, PAUSE_EMPTY);
    }
  }

  // 启动
  advance();
</script>

</body>
</html>
